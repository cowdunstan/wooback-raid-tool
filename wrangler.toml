# Config for deploying the Raid-Helper CORS proxy with Wrangler:
#   npx wrangler deploy
# (first run opens a browser to log in to Cloudflare)
#
# After deploy, Wrangler prints the Worker URL (…workers.dev). Paste that into
# the "CORS proxy base URL" field in index.html.
name = "rh-proxy"
main = "raidhelper-proxy.worker.js"
compatibility_date = "2026-07-19"
